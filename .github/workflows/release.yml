name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build and test retrostash module
        run: ./gradlew :retrostash:clean :retrostash:compileReleaseKotlin :retrostash:testDebugUnitTest --console=plain

      - name: Publish release artifacts to Maven Local (verification)
        run: ./gradlew :retrostash:publishReleasePublicationToMavenLocal --console=plain

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Write release summary
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          {
            echo "## Release Summary"
            echo ""
            echo "- Tag: ${TAG_NAME}"
            echo "- Release page: https://github.com/${{ github.repository }}/releases/tag/${TAG_NAME}"
            echo "- Module checks: :retrostash:compileReleaseKotlin and :retrostash:testDebugUnitTest"
            echo "- Maven Local verification: :retrostash:publishReleasePublicationToMavenLocal"
          } >> "$GITHUB_STEP_SUMMARY"

  bump-next-snapshot:
    runs-on: ubuntu-latest
    needs: release
    if: success()

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Bump POM_VERSION to next snapshot
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          base_version="${TAG_NAME#v}"
          if ! echo "$base_version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Tag '$TAG_NAME' is not semver-like (vX.Y.Z), skipping bump."
            exit 0
          fi

          major=$(echo "$base_version" | cut -d. -f1)
          minor=$(echo "$base_version" | cut -d. -f2)
          patch=$(echo "$base_version" | cut -d. -f3)
          next_patch=$((patch + 1))
          next_snapshot="${major}.${minor}.${next_patch}-SNAPSHOT"

          sed -i "s/^POM_VERSION=.*/POM_VERSION=${next_snapshot}/" gradle.properties
          echo "Next snapshot: ${next_snapshot}"
          echo "NEXT_SNAPSHOT=${next_snapshot}" >> "$GITHUB_ENV"

      - name: Update README example version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          tag_name = os.environ["TAG_NAME"]
          readme = Path("README.md")
          text = readme.read_text()
          updated = re.sub(
              r'implementation\("com\.github\.logickoder:retrostash:v[^"\\)]+"\)',
              f'implementation("com.github.logickoder:retrostash:{tag_name}")',
              text,
              count=1,
          )
          if updated == text:
              raise SystemExit("README version line not found")
          readme.write_text(updated)
          PY

      - name: Commit and push
        env:
          NEXT_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- gradle.properties README.md; then
            echo "No version changes to commit."
            exit 0
          fi

          git add gradle.properties README.md
          git commit -m "chore: bump POM_VERSION and README after ${NEXT_VERSION} release"
          git push origin HEAD:main

      - name: Write snapshot bump summary
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          {
            echo "## Post-Release Update Summary"
            echo ""
            echo "- Released tag: ${TAG_NAME}"
            echo "- Next snapshot in gradle.properties: ${NEXT_SNAPSHOT:-not-updated}"
            echo "- README dependency example updated to: com.github.logickoder:retrostash:${TAG_NAME}"
            echo "- Commit pushed to main when changes were detected"
          } >> "$GITHUB_STEP_SUMMARY"
