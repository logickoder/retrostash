name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: Select semantic version bump for manual release
        required: true
        default: patch
        type: choice
        options:
          - major
          - minor
          - patch

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release_meta.outputs.tag_name }}
      created_tag: ${{ steps.release_meta.outputs.created_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release_meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" = "push" ]; then
            tag_name="${REF_NAME}"
            created_tag="false"
          else
            bump="${INPUT_BUMP}"
            latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)"
            if [ -z "${latest_tag}" ]; then
              latest_tag="v0.0.0"
            fi

            base_version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "${base_version}"

            case "${bump}" in
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              patch)
                patch=$((patch + 1))
                ;;
              *)
                echo "Unsupported bump type: ${bump}" >&2
                exit 1
                ;;
            esac

            tag_name="v${major}.${minor}.${patch}"
            created_tag="true"
            echo "Latest existing tag: ${latest_tag}"
            echo "Computed next tag: ${tag_name}"
          fi

          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "created_tag=${created_tag}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build and test retrostash module
        run: ./gradlew :retrostash:clean :retrostash:compileReleaseKotlin :retrostash:testDebugUnitTest --console=plain

      - name: Publish release artifacts to Maven Local (verification)
        run: ./gradlew :retrostash:publishReleasePublicationToMavenLocal --console=plain

      - name: JitPack compatibility build (verification)
        run: ./gradlew :retrostash:assembleRelease :retrostash:publishToMavenLocal --console=plain

      - name: Create and push tag (manual release only)
        if: steps.release_meta.outputs.created_tag == 'true'
        env:
          TAG_NAME: ${{ steps.release_meta.outputs.tag_name }}
        run: |
          set -euo pipefail

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag already exists on origin: ${TAG_NAME}" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${TAG_NAME}"
          git push origin "refs/tags/${TAG_NAME}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          generate_release_notes: true

      - name: Trigger JitPack build for tag
        env:
          TAG_NAME: ${{ steps.release_meta.outputs.tag_name }}
        run: |
          set -euo pipefail

          build_log_url="https://jitpack.io/com/github/logickoder/retrostash/${TAG_NAME}/build.log"
          echo "Triggering JitPack build: ${build_log_url}"

          # Hitting the build log endpoint warms the build for the requested tag.
          curl --fail --silent --show-error --location --retry 5 --retry-delay 10 "${build_log_url}" >/dev/null || {
            echo "JitPack trigger failed (non-blocking)."
            exit 0
          }

      - name: Write release summary
        env:
          TAG_NAME: ${{ steps.release_meta.outputs.tag_name }}
          CREATED_TAG: ${{ steps.release_meta.outputs.created_tag }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          {
            echo "## Release Summary"
            echo ""
            echo "- Trigger: ${EVENT_NAME}"
            echo "- Tag: ${TAG_NAME}"
            echo "- Tag created in workflow: ${CREATED_TAG}"
            echo "- Release page: https://github.com/${{ github.repository }}/releases/tag/${TAG_NAME}"
            echo "- Module checks: :retrostash:compileReleaseKotlin and :retrostash:testDebugUnitTest"
            echo "- Maven Local verification: :retrostash:publishReleasePublicationToMavenLocal"
            echo "- JitPack compatibility verification: :retrostash:assembleRelease and :retrostash:publishToMavenLocal"
            echo "- JitPack build trigger: https://jitpack.io/com/github/logickoder/retrostash/${TAG_NAME}/build.log"
          } >> "$GITHUB_STEP_SUMMARY"

  bump-next-snapshot:
    runs-on: ubuntu-latest
    needs: release
    if: success()

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Bump POM_VERSION to next snapshot
        env:
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
        run: |
          set -euo pipefail

          next_snapshot="$(python3 "${GITHUB_WORKSPACE}/scripts/bump_pom_version.py" "${TAG_NAME}" "${GITHUB_WORKSPACE}/gradle.properties")"
          if [ "${next_snapshot}" = "SKIPPED" ]; then
            echo "Tag '${TAG_NAME}' is not semver-like (vX.Y.Z), skipping bump."
            exit 0
          fi

          echo "Next snapshot: ${next_snapshot}"
          echo "NEXT_SNAPSHOT=${next_snapshot}" >> "$GITHUB_ENV"

      - name: Update README example version
        env:
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          python3 "${GITHUB_WORKSPACE}/scripts/update_readme_version.py" "${TAG_NAME}"

      - name: Commit and push
        env:
          NEXT_VERSION: ${{ needs.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- gradle.properties README.md; then
            echo "No version changes to commit."
            exit 0
          fi

          git add gradle.properties README.md
          git commit -m "chore: bump POM_VERSION and README after ${NEXT_VERSION} release"
          git push origin HEAD:main

      - name: Write snapshot bump summary
        env:
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
        run: |
          {
            echo "## Post-Release Update Summary"
            echo ""
            echo "- Released tag: ${TAG_NAME}"
            echo "- Next snapshot in gradle.properties: ${NEXT_SNAPSHOT:-not-updated}"
            echo "- README dependency example updated to: com.github.logickoder:retrostash:${TAG_NAME}"
            echo "- Commit pushed to main when changes were detected"
          } >> "$GITHUB_STEP_SUMMARY"
