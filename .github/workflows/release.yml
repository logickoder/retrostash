name: Release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:
    inputs:
      bump:
        description: Select semantic version bump for manual release
        required: true
        default: patch
        type: choice
        options:
          - major
          - minor
          - patch

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    outputs:
      tag_name: ${{ steps.release_meta.outputs.tag_name }}
      created_tag: ${{ steps.release_meta.outputs.created_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release_meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" = "push" ]; then
            tag_name="${REF_NAME}"
            created_tag="false"
          else
            bump="${INPUT_BUMP}"
            latest_tag="$(git tag --list '[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)"
            if [ -z "${latest_tag}" ]; then
              latest_tag="0.0.0"
            fi

            IFS='.' read -r major minor patch <<< "${latest_tag}"

            case "${bump}" in
              major)
                major=$((major + 1)); minor=0; patch=0 ;;
              minor)
                minor=$((minor + 1)); patch=0 ;;
              patch)
                patch=$((patch + 1)) ;;
              *)
                echo "Unsupported bump type: ${bump}" >&2; exit 1 ;;
            esac

            tag_name="${major}.${minor}.${patch}"
            created_tag="true"
            echo "Latest existing tag: ${latest_tag}"
            echo "Computed next tag: ${tag_name}"
          fi

          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "created_tag=${created_tag}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Set release version in gradle.properties
        env:
          TAG_NAME: ${{ steps.release_meta.outputs.tag_name }}
        run: |
          set -euo pipefail
          sed -i '' -E "s|^POM_VERSION=.*|POM_VERSION=${TAG_NAME}|" gradle.properties
          grep '^POM_VERSION=' gradle.properties

      - name: Run KMP test suite
        run: |
          ./gradlew \
            :retrostash-core:jvmTest :retrostash-core:iosSimulatorArm64Test \
            :retrostash-okhttp:jvmTest \
            :retrostash-ktor:jvmTest :retrostash-ktor:iosSimulatorArm64Test \
            :retrostash-annotations:assemble \
            --console=plain

      - name: Verify Maven Local publish (all KMP modules)
        run: ./gradlew publishToMavenLocal --console=plain

      - name: Build iOS XCFramework (release)
        run: ./gradlew :retrostash-ktor:assembleRetrostashReleaseXCFramework --console=plain

      - name: Package XCFramework zip + checksum
        id: xcframework
        env:
          TAG_NAME: ${{ steps.release_meta.outputs.tag_name }}
        run: |
          set -euo pipefail
          src="retrostash-ktor/build/XCFrameworks/release/Retrostash.xcframework"
          out="Retrostash.xcframework.zip"
          (cd "$(dirname "$src")" && zip -ry "${GITHUB_WORKSPACE}/${out}" "$(basename "$src")")
          checksum="$(swift package compute-checksum "${out}")"
          echo "checksum=${checksum}" >> "$GITHUB_OUTPUT"
          echo "zip=${out}" >> "$GITHUB_OUTPUT"

      - name: Update Package.swift checksum + version
        env:
          TAG_NAME: ${{ steps.release_meta.outputs.tag_name }}
          CHECKSUM: ${{ steps.xcframework.outputs.checksum }}
        run: |
          set -euo pipefail
          sed -i '' -E "s|^let version = \".*\"$|let version = \"${TAG_NAME}\"|" Package.swift
          sed -i '' -E "s|REPLACE_WITH_RELEASE_CHECKSUM|${CHECKSUM}|" Package.swift
          sed -i '' -E "s|checksum: \"[a-f0-9]{64}\"|checksum: \"${CHECKSUM}\"|" Package.swift

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew publishAndReleaseToMavenCentral --console=plain --no-configuration-cache

      - name: Create and push tag (manual release only)
        if: steps.release_meta.outputs.created_tag == 'true'
        env:
          TAG_NAME: ${{ steps.release_meta.outputs.tag_name }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag already exists on origin: ${TAG_NAME}" >&2; exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${TAG_NAME}"
          git push origin "refs/tags/${TAG_NAME}"

      - name: Create GitHub Release with XCFramework
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          generate_release_notes: true
          files: ${{ steps.xcframework.outputs.zip }}

      - name: Write release summary
        env:
          TAG_NAME: ${{ steps.release_meta.outputs.tag_name }}
          CHECKSUM: ${{ steps.xcframework.outputs.checksum }}
        run: |
          {
            echo "## Release ${TAG_NAME}"
            echo ""
            echo "- Maven Central artifacts: \`dev.logickoder:retrostash-{core,annotations,ktor,okhttp}:${TAG_NAME}\`"
            echo "- iOS SPM XCFramework attached to GitHub Release"
            echo "- XCFramework SHA-256: \`${CHECKSUM}\`"
            echo "- Release page: https://github.com/${{ github.repository }}/releases/tag/${TAG_NAME}"
          } >> "$GITHUB_STEP_SUMMARY"

  bump-next-snapshot:
    runs-on: ubuntu-latest
    needs: release
    if: success()

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump POM_VERSION to next snapshot
        env:
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          next_snapshot="$(python3 "${GITHUB_WORKSPACE}/scripts/bump_pom_version.py" "${TAG_NAME}" "${GITHUB_WORKSPACE}/gradle.properties")"
          if [ "${next_snapshot}" = "SKIPPED" ]; then
            echo "Tag '${TAG_NAME}' is not semver-like, skipping bump."; exit 0
          fi
          echo "Next snapshot: ${next_snapshot}"
          echo "NEXT_SNAPSHOT=${next_snapshot}" >> "$GITHUB_ENV"

      - name: Update README example version
        env:
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          python3 "${GITHUB_WORKSPACE}/scripts/update_readme_version.py" "${TAG_NAME}"

      - name: Pin Package.swift to released version + checksum
        env:
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          checksum="$(curl -fsSL "https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/Retrostash.xcframework.zip" -o /tmp/xcf.zip && shasum -a 256 /tmp/xcf.zip | awk '{print $1}')"
          sed -i -E "s|^let version = \".*\"$|let version = \"${TAG_NAME}\"|" Package.swift
          sed -i -E "s|checksum: \"[A-Za-z0-9_]+\"|checksum: \"${checksum}\"|" Package.swift

      - name: Commit and push
        env:
          NEXT_VERSION: ${{ needs.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- gradle.properties README.md Package.swift; then
            echo "No version changes to commit."; exit 0
          fi
          git add gradle.properties README.md Package.swift
          git commit -m "chore: bump POM_VERSION + Package.swift after ${NEXT_VERSION} release"
          git push origin HEAD:main
