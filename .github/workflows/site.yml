name: Site

on:
  push:
    branches: [ main ]
    paths:
      - "landing/**"
      - "composeApp/src/wasmJsMain/**"
      - "composeApp/src/commonMain/**"
      - "retrostash-core/src/**"
      - "retrostash-annotations/src/**"
      - "retrostash-ktor/src/**"
      - "retrostash-okhttp/src/**"
      - "gradle/libs.versions.toml"
      - "gradle.properties"
      - ".github/workflows/site.yml"
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  landing:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: landing/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - uses: actions/upload-artifact@v7
        with:
          name: landing-dist
          path: landing/dist/
          retention-days: 30

  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false
          cache-cleanup: always

      - name: Generate Dokka HTML
        run: ./gradlew dokkaGenerate -PRELEASE_SIGNING_ENABLED=false --console=plain

      - uses: actions/upload-artifact@v7
        with:
          name: docs-html
          path: build/dokka/html/
          retention-days: 30

  sample:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false
          cache-cleanup: always

      - name: Cache wasmJs node + yarn
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/nodejs
            ~/.gradle/yarn
            kotlin-js-store
          key: wasm-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            wasm-${{ runner.os }}-

      - name: Build wasmJs sample
        run: ./gradlew :composeApp:wasmJsBrowserDistribution
          -PRELEASE_SIGNING_ENABLED=false --console=plain

      - uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: composeApp/build/dist/wasmJs/productionExecutable/
          retention-days: 30

  pages:
    runs-on: ubuntu-latest
    needs: [ landing, docs, sample ]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download landing
        uses: actions/download-artifact@v8
        with:
          name: landing-dist
          path: site

      - name: Download web sample
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: site/playground

      - name: Download Dokka HTML
        uses: actions/download-artifact@v8
        with:
          name: docs-html
          path: site/api

      - uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
